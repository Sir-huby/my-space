<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音乐可视化器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            color: #fff;
            overflow: hidden;
        }
        canvas { display: block; }
        .controls {
            position: fixed;
            bottom: 30px;
            display: flex;
            gap: 16px;
            align-items: center;
            z-index: 10;
        }
        .btn {
            padding: 12px 28px;
            border: 2px solid rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.05);
            color: #fff;
            border-radius: 50px;
            cursor: pointer;
            font-size: 0.95rem;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
        }
        .btn:hover {
            background: rgba(255,255,255,0.15);
            border-color: #6c63ff;
        }
        .hint {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
            pointer-events: none;
        }
        .hint h1 {
            font-size: 2.5rem;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #6c63ff, #e94560);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .hint p { color: #888; font-size: 1.1rem; }
        .hint.hidden { display: none; }
        .mode-label { color: #888; font-size: 0.85rem; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>
<a href="index.html" style="position:fixed;top:20px;left:20px;z-index:999;display:flex;align-items:center;gap:8px;padding:10px 20px;background:rgba(0,0,0,0.4);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.1);border-radius:50px;color:rgba(255,255,255,0.7);text-decoration:none;font-size:0.85rem;font-family:'Segoe UI','Microsoft YaHei',sans-serif;transition:all 0.3s;" onmouseover="this.style.borderColor='#6c63ff';this.style.color='#fff'" onmouseout="this.style.borderColor='rgba(255,255,255,0.1)';this.style.color='rgba(255,255,255,0.7)'">← 返回主页</a>
<canvas id="canvas"></canvas>

<div class="hint" id="hint">
    <h1>🎵 音乐可视化器</h1>
    <p>点击下方按钮选择一首音乐，或使用内置节拍演示</p>
</div>

<div class="controls">
    <button class="btn" id="fileBtn">🎵 选择音乐文件</button>
    <button class="btn" id="demoBtn">🎧 内置节拍演示</button>
    <button class="btn" id="modeBtn">🔄 切换样式</button>
    <input type="file" id="fileInput" accept="audio/*">
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const hint = document.getElementById('hint');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

let audioCtx, analyser, source, dataArray, bufferLength;
let mode = 0;
const MODES = 4;
let isPlaying = false;
let demoPhase = 0;
let useDemo = false;

function initAudio() {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 512;
    bufferLength = analyser.frequencyBinCount;
    dataArray = new Uint8Array(bufferLength);
}

document.getElementById('fileBtn').onclick = () => document.getElementById('fileInput').click();

document.getElementById('fileInput').onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    if (!audioCtx) initAudio();
    useDemo = false;
    hint.classList.add('hidden');
    const reader = new FileReader();
    reader.onload = (ev) => {
        audioCtx.decodeAudioData(ev.target.result, (buffer) => {
            if (source) source.stop();
            source = audioCtx.createBufferSource();
            source.buffer = buffer;
            source.connect(analyser);
            analyser.connect(audioCtx.destination);
            source.loop = true;
            source.start(0);
            isPlaying = true;
        });
    };
    reader.readAsArrayBuffer(file);
};

document.getElementById('demoBtn').onclick = () => {
    useDemo = true;
    isPlaying = true;
    hint.classList.add('hidden');
    if (!dataArray) {
        bufferLength = 256;
        dataArray = new Uint8Array(bufferLength);
    }
};

document.getElementById('modeBtn').onclick = () => { mode = (mode + 1) % MODES; };

function generateDemoData() {
    demoPhase += 0.03;
    for (let i = 0; i < bufferLength; i++) {
        const bass = i < 20 ? 180 + 70 * Math.sin(demoPhase * 2 + i * 0.1) : 0;
        const mid = (i > 20 && i < 100) ? 120 + 60 * Math.sin(demoPhase * 3 + i * 0.2) : 0;
        const high = i > 100 ? 60 + 40 * Math.sin(demoPhase * 5 + i * 0.5) : 0;
        const beat = 30 * Math.abs(Math.sin(demoPhase * 4));
        dataArray[i] = Math.min(255, Math.max(0, bass + mid + high + beat + Math.random() * 20));
    }
}

function hsl(h, s, l) { return `hsl(${h}, ${s}%, ${l}%)`; }

function drawBars() {
    const barW = (W / bufferLength) * 2.5;
    const startX = (W - barW * bufferLength) / 2;
    for (let i = 0; i < bufferLength; i++) {
        const v = dataArray[i] / 255;
        const h = (i / bufferLength) * 360;
        const barH = v * H * 0.7;
        ctx.fillStyle = hsl(h, 80, 50 + v * 20);
        ctx.shadowColor = hsl(h, 80, 60);
        ctx.shadowBlur = 15;
        ctx.fillRect(startX + i * barW, H - barH, barW - 1, barH);
        ctx.fillRect(startX + i * barW, 0, barW - 1, barH * 0.3);
    }
    ctx.shadowBlur = 0;
}

function drawCircle() {
    const cx = W / 2, cy = H / 2;
    const baseR = Math.min(W, H) * 0.2;
    let avgVal = 0;
    for (let i = 0; i < bufferLength; i++) avgVal += dataArray[i];
    avgVal /= bufferLength;
    const r = baseR + (avgVal / 255) * 60;

    for (let i = 0; i < bufferLength; i++) {
        const angle = (i / bufferLength) * Math.PI * 2 - Math.PI / 2;
        const v = dataArray[i] / 255;
        const len = v * 150 + 5;
        const h = (i / bufferLength) * 360 + demoPhase * 50;
        ctx.strokeStyle = hsl(h % 360, 80, 55);
        ctx.lineWidth = 2.5;
        ctx.shadowColor = hsl(h % 360, 80, 60);
        ctx.shadowBlur = 8;
        ctx.beginPath();
        ctx.moveTo(cx + Math.cos(angle) * r, cy + Math.sin(angle) * r);
        ctx.lineTo(cx + Math.cos(angle) * (r + len), cy + Math.sin(angle) * (r + len));
        ctx.stroke();
    }
    ctx.shadowBlur = 0;

    const grd = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
    grd.addColorStop(0, `hsla(${(demoPhase * 50) % 360}, 60%, 20%, 0.6)`);
    grd.addColorStop(1, `hsla(${(demoPhase * 50 + 180) % 360}, 60%, 10%, 0.1)`);
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fill();
}

function drawWave() {
    for (let wave = 0; wave < 3; wave++) {
        ctx.beginPath();
        const hue = (wave * 120 + demoPhase * 40) % 360;
        ctx.strokeStyle = hsl(hue, 80, 60);
        ctx.lineWidth = 3;
        ctx.shadowColor = hsl(hue, 80, 60);
        ctx.shadowBlur = 15;
        for (let i = 0; i < bufferLength; i++) {
            const x = (i / bufferLength) * W;
            const v = dataArray[i] / 255;
            const y = H / 2 + (v - 0.5) * H * 0.6 * (1 - wave * 0.25);
            i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        ctx.stroke();
    }
    ctx.shadowBlur = 0;
}

const particles = [];
function drawParticles() {
    let bass = 0;
    for (let i = 0; i < 10; i++) bass += dataArray[i] || 0;
    bass /= 10;
    const intensity = bass / 255;

    if (intensity > 0.5 && Math.random() < intensity) {
        for (let j = 0; j < 3; j++) {
            particles.push({
                x: W / 2, y: H / 2,
                vx: (Math.random() - 0.5) * intensity * 15,
                vy: (Math.random() - 0.5) * intensity * 15,
                life: 1,
                hue: Math.random() * 360,
                size: 2 + Math.random() * 4
            });
        }
    }
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.life -= 0.012;
        if (p.life <= 0) { particles.splice(i, 1); continue; }
        ctx.fillStyle = `hsla(${p.hue}, 80%, 60%, ${p.life})`;
        ctx.shadowColor = `hsla(${p.hue}, 80%, 60%, ${p.life})`;
        ctx.shadowBlur = 10;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.shadowBlur = 0;

    for (let i = 0; i < bufferLength; i++) {
        const v = dataArray[i] / 255;
        if (v < 0.1) continue;
        const angle = (i / bufferLength) * Math.PI * 2;
        const r = 100 + v * 200;
        const x = W / 2 + Math.cos(angle + demoPhase) * r;
        const y = H / 2 + Math.sin(angle + demoPhase) * r;
        const hue = (i / bufferLength) * 360;
        ctx.fillStyle = `hsla(${hue}, 80%, 60%, ${v * 0.7})`;
        ctx.beginPath();
        ctx.arc(x, y, v * 5, 0, Math.PI * 2);
        ctx.fill();
    }
}

function draw() {
    ctx.fillStyle = 'rgba(10,10,10,0.15)';
    ctx.fillRect(0, 0, W, H);

    if (!isPlaying) { requestAnimationFrame(draw); return; }

    if (useDemo) {
        generateDemoData();
    } else if (analyser) {
        analyser.getByteFrequencyData(dataArray);
    }

    switch (mode) {
        case 0: drawBars(); break;
        case 1: drawCircle(); break;
        case 2: drawWave(); break;
        case 3: drawParticles(); break;
    }

    requestAnimationFrame(draw);
}
draw();
</script>
<script src="firebase-config.js"></script><script src="auth.js"></script>
</body>
</html>
