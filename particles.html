<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>粒子互动画布</title>
    <style>
        * { margin: 0; padding: 0; }
        body { background: #050510; overflow: hidden; cursor: none; }
        canvas { display: block; }
        .custom-cursor {
            position: fixed;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.5);
            border-radius: 50%;
            pointer-events: none;
            z-index: 999;
            transform: translate(-50%, -50%);
            transition: width 0.2s, height 0.2s, border-color 0.3s;
        }
        .custom-cursor.active {
            width: 40px;
            height: 40px;
            border-color: #6c63ff;
        }
        .info {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.4);
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            font-size: 0.85rem;
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }
        .controls {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 10;
        }
        .ctrl-btn {
            padding: 8px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.15);
            color: rgba(255,255,255,0.6);
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8rem;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
            pointer-events: all;
        }
        .ctrl-btn:hover {
            background: rgba(108,99,255,0.2);
            border-color: #6c63ff;
            color: #fff;
        }
    </style>
</head>
<body>
<a href="index.html" style="position:fixed;top:20px;left:20px;z-index:999;display:flex;align-items:center;gap:8px;padding:10px 20px;background:rgba(0,0,0,0.4);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.1);border-radius:50px;color:rgba(255,255,255,0.7);text-decoration:none;font-size:0.85rem;font-family:'Segoe UI','Microsoft YaHei',sans-serif;transition:all 0.3s;" onmouseover="this.style.borderColor='#6c63ff';this.style.color='#fff'" onmouseout="this.style.borderColor='rgba(255,255,255,0.1)';this.style.color='rgba(255,255,255,0.7)'">← 返回主页</a>
<canvas id="c"></canvas>
<div class="custom-cursor" id="cursor"></div>
<div class="info">移动鼠标 · 点击产生爆炸 · 按住拖动绘制光带</div>
<div class="controls">
    <button class="ctrl-btn" onclick="switchMode()">🎨 切换模式</button>
    <button class="ctrl-btn" onclick="switchColor()">🌈 切换配色</button>
    <button class="ctrl-btn" onclick="clearAll()">✨ 清空画布</button>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const cursorEl = document.getElementById('cursor');
let W, H;
function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
resize();
addEventListener('resize', resize);

let mx = W / 2, my = H / 2;
let mouseDown = false;
let mode = 0;
let colorScheme = 0;

const colorSchemes = [
    // [hueStart, hueEnd]
    [240, 340],    // 紫粉
    [160, 220],    // 青蓝
    [0, 60],       // 火焰
    [80, 160],     // 绿意
    [0, 360],      // 彩虹
];

const particles = [];
const trails = [];
const MAX_P = 2000;

class Particle {
    constructor(x, y, vx, vy, opts = {}) {
        this.x = x; this.y = y;
        this.vx = vx; this.vy = vy;
        this.life = opts.life || 1;
        this.decay = opts.decay || (0.005 + Math.random() * 0.01);
        this.size = opts.size || (1.5 + Math.random() * 3);
        const scheme = colorSchemes[colorScheme];
        this.hue = opts.hue || (scheme[0] + Math.random() * (scheme[1] - scheme[0]));
        this.gravity = opts.gravity || 0;
        this.friction = opts.friction || 0.99;
    }
    update() {
        this.vy += this.gravity;
        this.vx *= this.friction;
        this.vy *= this.friction;
        this.x += this.vx;
        this.y += this.vy;
        this.life -= this.decay;
    }
    draw() {
        const a = this.life;
        ctx.fillStyle = `hsla(${this.hue % 360}, 80%, 60%, ${a})`;
        ctx.shadowColor = `hsla(${this.hue % 360}, 80%, 60%, ${a * 0.5})`;
        ctx.shadowBlur = this.size * 4;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
        ctx.fill();
    }
}

function spawnTrail(x, y) {
    if (particles.length > MAX_P) return;
    const scheme = colorSchemes[colorScheme];
    const hue = scheme[0] + ((Date.now() * 0.05) % (scheme[1] - scheme[0]));
    switch (mode) {
        case 0: // 流光
            for (let i = 0; i < 3; i++) {
                particles.push(new Particle(x, y,
                    (Math.random() - 0.5) * 2,
                    (Math.random() - 0.5) * 2,
                    { hue, size: 2 + Math.random() * 2, decay: 0.008 }
                ));
            }
            break;
        case 1: // 烟花
            for (let i = 0; i < 2; i++) {
                particles.push(new Particle(x, y,
                    (Math.random() - 0.5) * 4,
                    -Math.random() * 3 - 1,
                    { hue, gravity: 0.03, size: 2, decay: 0.006 }
                ));
            }
            break;
        case 2: // 星尘
            const angle = Math.random() * Math.PI * 2;
            const speed = 0.5 + Math.random();
            particles.push(new Particle(x, y,
                Math.cos(angle) * speed,
                Math.sin(angle) * speed,
                { hue, size: 1 + Math.random() * 4, decay: 0.003, friction: 0.995 }
            ));
            break;
    }
}

function explode(x, y) {
    const count = 80 + Math.random() * 40;
    const scheme = colorSchemes[colorScheme];
    const baseHue = scheme[0] + Math.random() * (scheme[1] - scheme[0]);
    for (let i = 0; i < count; i++) {
        const angle = (i / count) * Math.PI * 2;
        const speed = 2 + Math.random() * 8;
        particles.push(new Particle(x, y,
            Math.cos(angle) * speed,
            Math.sin(angle) * speed,
            {
                hue: baseHue + Math.random() * 40 - 20,
                size: 1.5 + Math.random() * 3.5,
                decay: 0.008 + Math.random() * 0.008,
                gravity: 0.02,
                friction: 0.98
            }
        ));
    }
}

addEventListener('mousemove', (e) => {
    mx = e.clientX; my = e.clientY;
    cursorEl.style.left = mx + 'px';
    cursorEl.style.top = my + 'px';
    spawnTrail(mx, my);
    if (mouseDown) {
        for (let i = 0; i < 5; i++) spawnTrail(mx + (Math.random()-0.5)*20, my + (Math.random()-0.5)*20);
    }
});
addEventListener('mousedown', (e) => {
    mouseDown = true;
    cursorEl.classList.add('active');
    explode(e.clientX, e.clientY);
});
addEventListener('mouseup', () => {
    mouseDown = false;
    cursorEl.classList.remove('active');
});

// 触摸支持
addEventListener('touchmove', (e) => {
    e.preventDefault();
    const t = e.touches[0];
    mx = t.clientX; my = t.clientY;
    for (let i = 0; i < 5; i++) spawnTrail(mx + (Math.random()-0.5)*20, my + (Math.random()-0.5)*20);
}, { passive: false });
addEventListener('touchstart', (e) => {
    const t = e.touches[0];
    explode(t.clientX, t.clientY);
});

function switchMode() { mode = (mode + 1) % 3; }
function switchColor() { colorScheme = (colorScheme + 1) % colorSchemes.length; }
function clearAll() { particles.length = 0; ctx.clearRect(0, 0, W, H); }

// 自动飘浮的背景粒子
const bgParticles = [];
for (let i = 0; i < 60; i++) {
    bgParticles.push({
        x: Math.random() * W,
        y: Math.random() * H,
        size: Math.random() * 2,
        speed: 0.2 + Math.random() * 0.5,
        opacity: 0.1 + Math.random() * 0.3
    });
}

function animate() {
    ctx.fillStyle = 'rgba(5, 5, 16, 0.08)';
    ctx.fillRect(0, 0, W, H);

    // 背景粒子
    bgParticles.forEach(p => {
        p.y -= p.speed;
        if (p.y < 0) { p.y = H; p.x = Math.random() * W; }
        ctx.fillStyle = `rgba(108, 99, 255, ${p.opacity})`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
    });

    // 主粒子
    for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].update();
        if (particles[i].life <= 0) { particles.splice(i, 1); continue; }
        particles[i].draw();
    }
    ctx.shadowBlur = 0;

    requestAnimationFrame(animate);
}
animate();
</script>
<script src="auth.js"></script>
</body>
</html>
